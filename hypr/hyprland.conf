monitor = auto, 2560x1440@165, 0x0, 1

render {
    cm_enabled = false
}

$terminal = kitty
# $fileManager = thunar
$fileManager = $terminal yazi
$opa = 0.9
# $menu = wofi --show drun -n
$menu = wofi -n
exec-once = ydotoold
exec-once = hypridle
exec-once = waybar 
exec-once = awww-daemon
exec-once = sleep .5 && awww restore
exec-once = dunst
exec-once = pypr
exec-once = pactl set-sink-mute @DEFAULT_SINK@ 0
exec-once = fcitx5 -d
exec-once = ~/.config/hypr/scripts/wall-shuffle.sh
exec-once = ~/.config/hypr/scripts/window-sound.sh
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,12
    
general {
        gaps_in = 0
        gaps_out = 0
        border_size = 3
        col.active_border = rgba(44bbbbFF) rgba(101212ff) rgba(ff4444ff) 45deg
        col.inactive_border = rgba(101212ff)
        resize_on_border = true
        allow_tearing = false
        layout = dwindle
}

decoration {
    rounding = 0
    active_opacity = $opa
    inactive_opacity = $opa
    fullscreen_opacity = 1
    blur {
        enabled = false
        size = 0
        passes = 0
        new_optimizations = false
        ignore_opacity = true
        xray = false
        popups = false
    }
    shadow {
        enabled = false 
        range = 4
        render_power = 5
        color = rgba(0,0,0,.5)
    }
}
animations {
    enabled = true
    bezier = fluid, 0.15, 0.85, 0.25, 1
    bezier = snappy, 0.3, 1, 0.4, 1
    animation = windows, 1, 3, fluid, popin 10%
    animation = windowsOut, 1, 2, snappy
    animation = fade, 1, 4, snappy
    animation = workspaces, 1, 1.7, snappy, slide
    animation = specialWorkspace, 1, 4, fluid, slidefadevert -35%
    animation = layers, 1, 2, snappy, popin 70%
    animation = layersOut, 1, 2, snappy, slide
}
dwindle {
    preserve_split = true
}
misc { 
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    focus_on_activate = true
}
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    repeat_delay = 150
    repeat_rate = 65
    kb_options = compose:ralt
    touchpad {
        natural_scroll = true
    }
}
gestures { # 
    
}
xwayland {
    force_zero_scaling = true
}
device {
    name = epic-mouse-v1
    sensitivity = 0
}
device {
    name = wacom-intuos-s-pen # 使用 hyprctl devices 获取准确名称
    output = DP-1             # 映射到特定显示器
    transform = 0             # 旋转角度
}
cursor {
    no_hardware_cursors = false
    # 在这里设置光标大小
}
group {
    groupbar {
        enabled = true          # 必须开启才能看到美化效果
        font_size = 8           # 缩小字体
        height = 2              # 【关键】极细的标签条，仅作为指示线
        priority = 3            # 渲染优先级
        render_titles = false   # 【核心简化】不显示文字标题，只留一条色块
        gradients = false       # 关闭渐变，使用扁平化色彩
        
        # 标签颜色设置
        col.active = rgba(ff4444ff)   # 当前活动的标签色
        col.inactive = rgba(00000000) # 其他后台标签色
    }
}
# 核心设置：定义光标主题和大小
env = XCURSOR_SIZE, 32
env = HYPRCURSOR_SIZE, 32

$mainMod = SUPER
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, I, exec, $terminal nvim
bind = $mainMod, C, exec, hyprctl dispatch killactive
bind = $mainMod, C, exec, bash -c "pw-play ~/.config/hypr/sounds/pop.ogg"
bind = $mainMod, E, exec, $terminal yazi
# bind = $mainMod, V, exec, hyprctl --batch "dispatch togglefloating; dispatch resizeactive exact 800 800; dispatch centerwindow 1;"
bind = $mainMod, V, togglefloating 
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo
bind = $mainMod, F, fullscreen
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, F, exec, firefox
bind = $mainMod SHIFT, C, exec, $terminal claude
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bind = $mainMod, bracketright, exec, playerctl --player=spotatui next
bind = $mainMod, bracketleft,  exec, playerctl --player=spotatui previous
bind = $mainMod ALT, left, movewindow, l
bind = $mainMod ALT, right, movewindow, r
bind = $mainMod ALT, up, movewindow, u
bind = $mainMod ALT, down, movewindow, d
bind = $mainMod SHIFT, A, exec, grimblast --freeze copy active
bind = $mainMod SHIFT, S, exec, grimblast --freeze copy area
bind = $mainMod SHIFT, D, exec, grimblast copy output
bind = $mainMod, l, exec, hyprlock
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod, D, movetoworkspace, special:magic
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod ALT, M, exit
bind = $mainMod, G, togglegroup
bind = $mainMod, TAB, changegroupactive
bind = $mainMod, H, lockactivegroup, toggle
bind = $mainMod, T, exec, pypr toggle taskbar
# $mainMod 一般是 Super 键
# 使用 Super + Alt + 方向键进行微调 (步长为 10px)
binde = $mainMod CTRL, right, resizeactive, 20 0
binde = $mainMod CTRL, left,  resizeactive, -20 0
binde = $mainMod CTRL, up,    resizeactive, 0 -20
binde = $mainMod CTRL, down,  resizeactive, 0 20

bind = $mainMod, B, exec, pkill -SIGUSR1 waybar || waybar
bind = $mainMod, O, exec, toggleopacity

# Window opacity adjustment
bind = $mainMod, mouse_up, exec, ~/.config/hypr/opacity.sh up
bind = $mainMod, mouse_down, exec, ~/.config/hypr/opacity.sh down

# Mouse control via ydotool
bind  = ALT, up,    exec, ~/.config/hypr/scripts/mouse-move.sh start up
bindr = ALT, up,    exec, ~/.config/hypr/scripts/mouse-move.sh stop up
bind  = ALT, down,  exec, ~/.config/hypr/scripts/mouse-move.sh start down
bindr = ALT, down,  exec, ~/.config/hypr/scripts/mouse-move.sh stop down
bind  = ALT, left,  exec, ~/.config/hypr/scripts/mouse-move.sh start left
bindr = ALT, left,  exec, ~/.config/hypr/scripts/mouse-move.sh stop left
bind  = ALT, right, exec, ~/.config/hypr/scripts/mouse-move.sh start right
bindr = ALT, right, exec, ~/.config/hypr/scripts/mouse-move.sh stop right
bindr = , Alt_L,    exec, ~/.config/hypr/scripts/mouse-move.sh stopall
bindr = , Alt_R,    exec, ~/.config/hypr/scripts/mouse-move.sh stopall
bindr = ALT, SPACE ,      exec, ~/.config/hypr/scripts/mouse-move.sh stopall
bind  = ALT, return,    exec, ydotool click 0xC0
bind  = ALT, backslash, exec, ydotool click 0xC1

env = GTK_IM_MODULE, fcitx
env = XMODIFIERS, @im=fcitx
env = QT_QPA_PLATFORMTHEME, qt5ct
env = QT_STYLE_OVERRIDE, Fusion
env = LITELOADERQQNT_PROFILE, /home/xiaou0/.config/LiteLoaderQQNT

layerrule = blur true waybar
layerrule = animation slide notifications

windowrule {
    name = tty-clock
    match:title = tty-clock

    float = true
}
